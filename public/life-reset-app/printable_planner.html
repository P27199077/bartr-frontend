<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Reset | Printable Weekly Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a;
            --muted: #475569;
            --border: #cbd5e1;
            --font-main: 'Inter', sans-serif;
            --font-head: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f1f5f9;
            color: var(--primary);
            font-family: var(--font-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Toolbar styles */
        .toolbar {
            width: 100%;
            max-width: 210mm;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .toolbar-info h1 {
            font-family: var(--font-head);
            font-size: 1.15rem;
            font-weight: 700;
        }

        .toolbar-info p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #1e293b;
        }

        .btn-secondary {
            background: #f8fafc;
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #f1f5f9;
        }

        /* Printable Page Layout */
        .planner-page {
            width: 210mm;
            height: 297mm;
            background: #ffffff;
            border: 1px solid var(--border);
            padding: 12mm 15mm;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .page-header h2 {
            font-family: var(--font-head);
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .week-focus {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 600;
        }

        .days-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Daily Row layout */
        .day-row {
            border-bottom: 1px dashed var(--border);
            padding: 8px 0;
            display: grid;
            grid-template-columns: 110px 1fr 1fr;
            gap: 15px;
            align-items: start;
        }

        .day-row:last-child {
            border-bottom: none;
        }

        /* Column 1: Date label */
        .day-label {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .day-num {
            font-family: var(--font-head);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
        }

        .day-date {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 600;
            margin-top: 1px;
        }

        /* Column 2: Static Habits Checklist */
        .habits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 10px;
        }

        .habit-item {
            display: flex;
            align-items: center;
            font-size: 0.68rem;
            color: #334155;
        }

        .checkbox {
            width: 11px;
            height: 11px;
            border: 1px solid var(--muted);
            border-radius: 2px;
            margin-right: 6px;
            flex-shrink: 0;
        }

        /* Column 3: Focus Tasks Checklist */
        .focus-tasks-stack {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-item {
            display: flex;
            align-items: start;
            font-size: 0.68rem;
            line-height: 1.3;
        }

        .task-item .checkbox {
            margin-top: 1.5px;
        }

        .task-item strong {
            color: var(--primary);
            font-weight: 700;
            margin-right: 3px;
        }

        .task-detail {
            color: #0f172a;
        }

        /* Page Footer */
        .page-footer {
            border-top: 1px solid var(--border);
            padding-top: 6px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--muted);
            font-weight: 500;
        }

        /* Print Specific Styling */
        @media print {
            body {
                background: #ffffff;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .planner-page {
                border: none;
                box-shadow: none;
                margin: 0;
                page-break-after: always;
                break-after: page;
                width: 210mm;
                height: 297mm;
            }
            
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }
    </style>
</head>
